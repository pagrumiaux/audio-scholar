# Paths
paths:
  database: "db/audio_scholar.db"
  chroma: "db/chroma"
  pdfs: "data/pdfs"
  raw: "data/raw"
  logs: "logs"

# Logging
logging:
  level: "INFO"
  format: "%(asctime)s | %(levelname)-8s | %(name)s | %(message)s"
  file: "audio_scholar.log"

# Database
database:
  timeout: 30
  wal_mode: true

# Scraping
scraping:
  arxiv:
    rate_limit: 3.0
    max_retries: 3
  ismir:
    rate_limit: 1.0
    max_retries: 3
  icassp:
    rate_limit: 1.0
    max_retries: 3

# PDF Processing
pdf:
  extractor: "pymupdf"
  download_timeout: 60
  max_file_size_mb: 50

# Embeddings
embeddings:
  model: "all-MiniLM-L6-v2"
  batch_size: 32
  device: "auto"

# LLM
llm:
  provider: "ollama"
  model: "llama3.1:8b"
  endpoint: "http://localhost:11434"
  context_length: 8192
  temperature: 0.7

# RAG
rag:
  top_k: 10
  min_similarity: 0.5
